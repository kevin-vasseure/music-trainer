<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f7;
    --surface: #ffffff;
    --border: #dddde8;
    --accent: #00a86b;
    --accent2: #e0003d;
    --accent3: #5040c8;
    --text: #18182a;
    --muted: #8080a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 10%, rgba(80,64,200,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 90% 90%, rgba(0,168,107,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }

  h1 em { color: var(--accent); font-style: normal; }

  .tagline {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* MODE TABS */
  .mode-tabs {
    display: flex;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .mode-tab {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    padding: 14px 0;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .mode-tab:last-child { border-right: none; }
  .mode-tab:hover { color: var(--text); background: var(--bg); }
  .mode-tab.active { color: var(--accent); background: rgba(0,168,107,0.05); }
  .mode-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent3), transparent);
    opacity: 0.25;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* SCALE SELECTOR */
  .scale-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 6px;
  }

  .scale-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 4px;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .scale-btn:hover { border-color: var(--accent3); color: var(--text); }
  .scale-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,168,107,0.06); }
  .scale-btn .scale-mood { display: block; font-size: 0.55rem; color: var(--muted); margin-top: 3px; }
  .scale-btn.active .scale-mood { color: rgba(0,168,107,0.7); }

  /* ROOT NOTE */
  .root-grid { display: flex; gap: 6px; flex-wrap: wrap; }

  .root-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .root-btn:hover { border-color: var(--accent3); color: var(--text); }
  .root-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(224,0,61,0.06); }

  /* NOTES DISPLAY */
  .notes-display { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; min-height: 36px; }

  .note-pill {
    background: rgba(80,64,200,0.08);
    border: 1px solid rgba(80,64,200,0.3);
    color: var(--accent3);
    font-size: 0.7rem;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .note-pill.root { background: rgba(224,0,61,0.08); border-color: rgba(224,0,61,0.35); color: var(--accent2); }
  .note-pill.playing { transform: translateY(-2px) scale(1.08); background: rgba(0,168,107,0.15); border-color: var(--accent); color: var(--accent); }

  /* KEYBOARD */
  .keyboard-wrap { overflow-x: auto; padding: 4px 0 8px; }

  .keyboard {
    display: flex;
    position: relative;
    height: 140px;
    width: fit-content;
    gap: 2px;
    padding: 0 4px;
  }

  .key {
    position: relative;
    cursor: pointer;
    border-radius: 0 0 5px 5px;
    transition: all 0.08s;
    user-select: none;
    -webkit-user-select: none;
  }

  .key.white {
    width: 44px; height: 140px;
    background: linear-gradient(180deg, #fdfdfd 0%, #f5f5f7 100%);
    border: 1px solid #d8d8e4;
    border-top: 3px solid #c8c8d8;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  .key.black {
    width: 28px; height: 88px;
    background: linear-gradient(180deg, #2a2a3e 0%, #1a1a28 100%);
    border: 1px solid #1a1a28;
    border-top: 3px solid #3a3a50;
    margin-left: -14px; margin-right: -14px;
    z-index: 2; flex-shrink: 0;
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  }

  .key.in-scale.white { background: linear-gradient(180deg, rgba(80,64,200,0.13) 0%, rgba(80,64,200,0.06) 100%); border-color: rgba(80,64,200,0.35); border-top-color: rgba(80,64,200,0.5); }
  .key.in-scale.black { background: linear-gradient(180deg, rgba(80,64,200,0.88) 0%, rgba(80,64,200,0.68) 100%); border-color: rgba(80,64,200,0.7); }
  .key.root-note.white { background: linear-gradient(180deg, rgba(224,0,61,0.2) 0%, rgba(224,0,61,0.1) 100%) !important; border-color: rgba(224,0,61,0.5) !important; border-top-color: rgba(224,0,61,0.7) !important; }
  .key.root-note.black { background: linear-gradient(180deg, rgba(224,0,61,0.85) 0%, rgba(224,0,61,0.65) 100%) !important; border-color: rgba(224,0,61,0.7) !important; }
  .key.playing { background: linear-gradient(180deg, rgba(0,168,107,0.4) 0%, rgba(0,168,107,0.2) 100%) !important; border-color: var(--accent) !important; transform: translateY(2px); box-shadow: 0 2px 12px rgba(0,168,107,0.25) !important; }

  .key-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 0.5rem; letter-spacing: 0.5px; pointer-events: none; }
  .key.white .key-label { bottom: 10px; color: #b8b8cc; }
  .key.black .key-label { bottom: 6px; color: rgba(255,255,255,0.3); }
  .key.in-scale.white .key-label { color: var(--accent3); }
  .key.in-scale.black .key-label { color: rgba(255,255,255,0.75); }
  .key.root-note .key-label { color: var(--accent2); }
  .key.root-note.black .key-label { color: rgba(255,255,255,0.85); }

  /* KBD LEGEND */
  .kbd-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

  .kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom: 2px solid #c8c8d8;
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .kbd span { color: var(--text); font-size: 0.5rem; }

  /* WAVE SELECTOR */
  .wave-grid { display: flex; gap: 6px; }

  .wave-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .wave-btn:hover { border-color: var(--accent3); color: var(--text); }
  .wave-btn.active { border-color: var(--accent3); color: var(--accent3); background: rgba(80,64,200,0.08); }

  /* FRETBOARD */
  .fretboard-wrap { overflow-x: auto; padding: 4px 0 10px; -webkit-overflow-scrolling: touch; }
  .fretboard { position: relative; }

  /* CONTROLS */
  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .ctrl-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  input[type="range"] { -webkit-appearance: none; background: var(--border); height: 3px; border-radius: 2px; width: 100px; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 6px rgba(0,168,107,0.4); }

  .val-display { font-size: 0.65rem; color: var(--accent); min-width: 30px; }

  /* BACKING TRACK */
  .backing-grid { display: grid; gap: 7px; }

  .backing-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 10px 14px;
    cursor: pointer;
    border-radius: 4px;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .backing-btn:hover { border-color: var(--accent3); color: var(--text); }
  .backing-genre { font-size: 0.5rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }

  /* TIPS */
  .tip-box {
    background: rgba(80,64,200,0.04);
    border: 1px solid rgba(80,64,200,0.15);
    border-left: 3px solid var(--accent3);
    border-radius: 4px;
    padding: 12px 16px;
    font-size: 0.65rem;
    line-height: 1.8;
    color: rgba(24,24,42,0.7);
    letter-spacing: 0.3px;
  }

  .tip-title { color: var(--accent3); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

  /* VISUALIZER */
  .visualizer { height: 60px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; position: relative; }
  .viz-bar { position: absolute; bottom: 0; width: 3px; border-radius: 2px 2px 0 0; opacity: 0.65; }

  /* ROW2 */
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>MUSIC<br><em>TRAINER</em></h1>
    <p class="tagline">improvise<br>sans fausses notes</p>
  </header>

  <div class="mode-tabs" id="modeTabs"></div>

  <div class="section">
    <div class="section-label">01 — choisir une gamme</div>
    <div style="margin-bottom:14px">
      <div class="section-label" style="margin-bottom:8px">tonique</div>
      <div class="root-grid" id="rootGrid"></div>
    </div>
    <div class="scale-grid" id="scaleGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">02 — notes de la gamme <span style="color:var(--accent2)">(rouge = tonique)</span></div>
    <div class="notes-display" id="notesDisplay"></div>
  </div>

  <div class="section" id="instrumentSection"></div>

  <div class="row2">
    <div class="section">
      <div class="section-label">04 — backing tracks (YouTube)</div>
      <div class="backing-grid" id="backingGrid"></div>
    </div>
    <div class="section">
      <div class="section-label">05 — conseil du moment</div>
      <div id="tipBox" class="tip-box"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">06 — visualiseur</div>
    <div class="visualizer" id="visualizer"></div>
  </div>

</div>
<script>
// ── THEORY ────────────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const SCALES = {
  'Pentatonique mineure':    { intervals:[0,3,5,7,10],     mood:'blues · rock · no wrong notes' },
  'Pentatonique majeure':    { intervals:[0,2,4,7,9],      mood:'joyeux · pop · country' },
  'Ionien (majeur)':         { intervals:[0,2,4,5,7,9,11], mood:'lumineux · classique' },
  'Dorien':                  { intervals:[0,2,3,5,7,9,10], mood:'jazzy · soul · funk' },
  'Phrygien':                { intervals:[0,1,3,5,7,8,10], mood:'sombre · espagnol · metal' },
  'Lydien':                  { intervals:[0,2,4,6,7,9,11], mood:'onirique · film · flottant' },
  'Mixolydien':              { intervals:[0,2,4,5,7,9,10], mood:'rock · blues · détendu' },
  'Éolien (naturel mineur)': { intervals:[0,2,3,5,7,8,10], mood:'mélancolique · classique' },
  'Blues':                   { intervals:[0,3,5,6,7,10],   mood:'blues · expressif · feeling' },
};

// ── DATA ──────────────────────────────────────────────────────
const MODES = {
  synth: {
    label: 'SYNTH',
    backing: [
      { name:'Am Pentatonique', genre:'Rock / Blues',    url:'https://www.youtube.com/results?search_query=A+minor+pentatonic+backing+track' },
      { name:'Cm Blues',        genre:'Blues',            url:'https://www.youtube.com/results?search_query=C+minor+blues+backing+track' },
      { name:'Dm Dorien',       genre:'Jazz / Funk',      url:'https://www.youtube.com/results?search_query=D+dorian+backing+track+jazz' },
      { name:'Em Mixolydien',   genre:'Rock / Modal',     url:'https://www.youtube.com/results?search_query=E+mixolydian+backing+track' },
      { name:'Gm Phrygien',     genre:'Metal / Flamenco', url:'https://www.youtube.com/results?search_query=G+phrygian+backing+track' },
      { name:'F Lydien',        genre:'Ambiant / Film',   url:'https://www.youtube.com/results?search_query=F+lydian+backing+track' },
    ],
    tips: [
      { title:'Joue avec les silences', text:'Une note, une pause. Deux notes, une pause. Les silences créent la tension et le relâchement. Ne remplis pas tout l\'espace.' },
      { title:'Répète une phrase',      text:'Joue 3–4 notes, retiens-toi. Répète exactement la même phrase puis change-la légèrement. C\'est comme ça que naissent les mélodies.' },
      { title:'Monte et descends',      text:'Plutôt que de sauter au hasard, monte graduellement la gamme puis redescends. Le contour mélodique crée de l\'émotion.' },
      { title:'La tonique = repos',     text:'La note rouge est ton ancre. Commence et termine tes phrases dessus pour un sentiment de résolution.' },
      { title:'Joue en rythme',         text:'Cale-toi sur le backing track. Joue sur les temps forts (1, 3) et syncopé sur les temps faibles. Le groove vient du timing.' },
      { title:'Varie les octaves',      text:'Répète ta phrase une octave plus haut ou plus bas. Effet immédiat qui donne de la profondeur à ton impro.' },
    ],
  },
  guitar: {
    label: 'GUITAR',
    strings: [
      {label:'e',midi:64},{label:'B',midi:59},{label:'G',midi:55},
      {label:'D',midi:50},{label:'A',midi:45},{label:'E',midi:40},
    ],
    markers:[3,5,7,9,12], double:[12],
    backing: [
      { name:'Am Pentatonique', genre:'Rock / Blues', url:'https://www.youtube.com/results?search_query=A+minor+pentatonic+guitar+backing+track' },
      { name:'Em Mixolydien',   genre:'Rock',         url:'https://www.youtube.com/results?search_query=E+mixolydian+guitar+backing+track' },
      { name:'Dm Dorien',       genre:'Jazz / Funk',  url:'https://www.youtube.com/results?search_query=D+dorian+guitar+backing+track' },
      { name:'Gm Blues',        genre:'Blues',        url:'https://www.youtube.com/results?search_query=G+minor+blues+guitar+backing+track' },
    ],
    tips: [
      { title:'Position de la main',      text:'Garde le pouce derrière le manche. Ça libère les doigts et évite les crampes. Un pouce qui déborde = mauvaise technique.' },
      { title:'Un doigt par case',         text:'Index=1, majeur=2, annulaire=3, auriculaire=4. Entraîne-toi à tenir cette règle dès le départ.' },
      { title:'La pentatonique d\'abord',  text:'5 notes, des patterns en boîte. Maîtrise la position 1 en Am — c\'est la base de 90% des solos rock/blues.' },
      { title:'Les slides',                text:'Glisse ton doigt d\'une note à l\'autre sans lâcher la corde. Le slide donne du caractère et du blues feeling.' },
      { title:'Les bends',                 text:'Tire la corde vers le haut pour monter d\'un demi-ton ou un ton. C\'est la technique la plus expressive de la guitare.' },
      { title:'Pratique lentement',        text:'La vitesse est la récompense de la lenteur. Joue à 50% du tempo, parfaitement propre. La vitesse vient seule.' },
    ],
  },
  ukulele: {
    label: 'UKULELE',
    strings: [
      {label:'A',midi:69},{label:'E',midi:64},{label:'C',midi:60},{label:'G',midi:67},
    ],
    markers:[3,5,7,10,12], double:[12],
    backing: [
      { name:'C Majeur',        genre:'Pop / Folk', url:'https://www.youtube.com/results?search_query=C+major+ukulele+backing+track' },
      { name:'Am Pentatonique', genre:'Pop / Folk', url:'https://www.youtube.com/results?search_query=A+minor+ukulele+backing+track' },
      { name:'G Majeur',        genre:'Reggae',     url:'https://www.youtube.com/results?search_query=G+major+ukulele+backing+track+reggae' },
      { name:'F Majeur',        genre:'Hawaïen',    url:'https://www.youtube.com/results?search_query=F+major+ukulele+backing+track+hawaiian' },
    ],
    tips: [
      { title:'Tuning réentrant',      text:'Le uke est accordé GCEA avec le Sol (G4) plus aigu que le Do. Cet accordage crée des patterns de mélodie uniques.' },
      { title:'Le strumming',          text:'Pattern de base : Down Down Up Up Down. Commence lentement, poignet souple. C\'est le poignet qui strumme, pas le bras.' },
      { title:'Cordes nylon',          text:'Les cordes en nylon demandent plus d\'appui que l\'acier. Appuie juste derrière la case pour éviter les faux-tons.' },
      { title:'La corde de sol',       text:'La G string offre des inversions impossibles sur guitare. Explore les sauts inattendus entre grave et aigu.' },
      { title:'Barré simplifié',       text:'4 cordes, petit manche : le barré est bien plus facile qu\'à la guitare. Travaille-le dès le début.' },
      { title:'Transposition guitare', text:'Am guitare = Cm ukulele (capodastre virtuel à la 5e case). Utile pour jammer avec des guitaristes.' },
    ],
  },
};

// ── STATE ─────────────────────────────────────────────────────
let currentMode  = 'synth';
let currentRoot  = 'A';
let currentScale = 'Pentatonique mineure';
let currentWave  = 'sawtooth';
let tipIndex     = 0;

const getScaleNotes = () => {
  const ri = NOTES.indexOf(currentRoot);
  return SCALES[currentScale].intervals.map(i => NOTES[(ri+i)%12]);
};

const midiToFreq = midi => 440 * Math.pow(2, (midi-69)/12);
const nameOctaveToFreq = (name, oct) => midiToFreq((oct+1)*12 + NOTES.indexOf(name));

// ── AUDIO ─────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx=null, masterGain, reverbGain, dryGain, convolver;
let volumeLevel=0.6, reverbLevel=0.25;
const activeOscillators={}, activePlucks={};

function initAudio() {
  if (ctx) return;
  ctx = new AudioCtx();
  masterGain = ctx.createGain(); masterGain.gain.value = volumeLevel;
  convolver  = ctx.createConvolver(); convolver.buffer = makeImpulse(2.5,3);
  reverbGain = ctx.createGain(); reverbGain.gain.value = reverbLevel;
  dryGain    = ctx.createGain(); dryGain.gain.value = 1-reverbLevel*0.5;
  masterGain.connect(dryGain); masterGain.connect(convolver);
  convolver.connect(reverbGain);
  dryGain.connect(ctx.destination); reverbGain.connect(ctx.destination);
}

function makeImpulse(dur, decay) {
  const buf = ctx.createBuffer(2, ctx.sampleRate*dur, ctx.sampleRate);
  for (let c=0;c<2;c++) { const ch=buf.getChannelData(c); for (let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,decay); }
  return buf;
}

function noteOn(freq, id) {
  if (!ctx) return;
  if (activeOscillators[id]) noteOff(id);
  const osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.type=currentWave; osc.frequency.setValueAtTime(freq,ctx.currentTime);
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.01);
  osc.connect(gain); gain.connect(masterGain); osc.start();
  activeOscillators[id]={osc,gain};
  vizFreq=freq; if (!vizAnim) animateViz();
}

function noteOff(id) {
  if (!activeOscillators[id]) return;
  const {osc,gain}=activeOscillators[id];
  gain.gain.setValueAtTime(gain.gain.value,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
  osc.stop(ctx.currentTime+0.3);
  delete activeOscillators[id];
}

function pluck(freq, id) {
  initAudio();
  const t=ctx.currentTime;
  if (activePlucks[id]) { try { activePlucks[id].stop(t); } catch(e){} }
  const osc1=ctx.createOscillator(), osc2=ctx.createOscillator();
  const filt=ctx.createBiquadFilter(), gain=ctx.createGain();
  osc1.type='sawtooth'; osc1.frequency.value=freq;
  osc2.type='triangle'; osc2.frequency.value=freq; osc2.detune.value=4;
  filt.type='lowpass';
  filt.frequency.setValueAtTime(Math.min(freq*8,9000),t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(freq*1.8,200),t+0.15);
  filt.Q.value=0.8;
  gain.gain.setValueAtTime(0.45,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+2.2);
  osc1.connect(filt); osc2.connect(filt); filt.connect(gain); gain.connect(masterGain);
  osc1.start(t); osc2.start(t); osc1.stop(t+2.5); osc2.stop(t+2.5);
  activePlucks[id]=osc1; setTimeout(()=>delete activePlucks[id],2600);
  vizFreq=freq; vizActive=true; if (!vizAnim) animateViz();
  setTimeout(()=>{ vizActive=false; },2400);
}

// ── KEYBOARD LAYOUT ───────────────────────────────────────────
const KEYBOARD_NOTES=[];
for (let oct=3;oct<=5;oct++) { const ns=oct===5?['C']:NOTES; for (const n of ns) KEYBOARD_NOTES.push({name:n,octave:oct,isBlack:n.includes('#')}); }

const KB_MAP={'a':'C3','w':'C#3','s':'D3','e':'D#3','d':'E3','f':'F3','t':'F#3','g':'G3','y':'G#3','h':'A3','u':'A#3','j':'B3','k':'C4','o':'C#4','l':'D4','p':'D#4',';':'E4',"'":'F4','z':'C4','x':'D4','c':'E4','v':'F4','b':'G4','n':'A4','m':'B4'};
const KB_REVERSE={};
for (const [k,v] of Object.entries(KB_MAP)) { if (!KB_REVERSE[v]) KB_REVERSE[v]=k; }

// ── RENDER ────────────────────────────────────────────────────
function renderModes() {
  const el=document.getElementById('modeTabs'); el.innerHTML='';
  Object.entries(MODES).forEach(([key,mode])=>{
    const b=document.createElement('button');
    b.className='mode-tab'+(key===currentMode?' active':'');
    b.textContent=mode.label;
    b.onclick=()=>{ currentMode=key; refresh(); };
    el.appendChild(b);
  });
}

function renderRoots() {
  const el=document.getElementById('rootGrid'); el.innerHTML='';
  NOTES.forEach(r=>{
    const b=document.createElement('button');
    b.className='root-btn'+(r===currentRoot?' active':'');
    b.textContent=r; b.onclick=()=>{ currentRoot=r; refreshScale(); };
    el.appendChild(b);
  });
}

function renderScales() {
  const el=document.getElementById('scaleGrid'); el.innerHTML='';
  Object.entries(SCALES).forEach(([name,data])=>{
    const b=document.createElement('button');
    b.className='scale-btn'+(name===currentScale?' active':'');
    b.innerHTML=`${name}<span class="scale-mood">${data.mood}</span>`;
    b.onclick=()=>{ currentScale=name; refreshScale(); };
    el.appendChild(b);
  });
}

function renderNotes() {
  const el=document.getElementById('notesDisplay'); el.innerHTML='';
  getScaleNotes().forEach((n,i)=>{
    const p=document.createElement('div');
    p.className='note-pill'+(i===0?' root':'');
    p.textContent=n; p.id='notepill-'+n; el.appendChild(p);
  });
}

function renderInstrumentSection() {
  const el=document.getElementById('instrumentSection'); el.innerHTML='';
  const vol=Math.round(volumeLevel*100), rev=Math.round(reverbLevel*100);
  if (currentMode==='synth') {
    el.innerHTML=`
      <div class="section-label">03 — clavier — joue les touches colorées</div>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <div>
          <div class="section-label" style="margin-bottom:6px">forme d'onde</div>
          <div class="wave-grid" id="waveGrid"></div>
        </div>
        <div class="controls-row" style="margin-left:auto">
          <span class="ctrl-label">volume</span>
          <input type="range" id="volumeSlider" min="0" max="100" value="${vol}">
          <span class="val-display" id="volDisplay">${vol}</span>
          <span class="ctrl-label" style="margin-left:12px">reverb</span>
          <input type="range" id="reverbSlider" min="0" max="100" value="${rev}">
          <span class="val-display" id="revDisplay">${rev}</span>
        </div>
      </div>
      <div class="keyboard-wrap"><div class="keyboard" id="keyboard"></div></div>
      <div class="kbd-legend" id="kbdLegend"></div>`;
    renderWaves(); renderKeyboard();
  } else {
    el.innerHTML=`
      <div class="section-label">03 — manche — clique sur les points pour jouer</div>
      <div class="fretboard-wrap"><div class="fretboard" id="fretboard"></div></div>
      <div class="controls-row" style="margin-top:14px">
        <span class="ctrl-label">volume</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="${vol}">
        <span class="val-display" id="volDisplay">${vol}</span>
        <span class="ctrl-label" style="margin-left:12px">reverb</span>
        <input type="range" id="reverbSlider" min="0" max="100" value="${rev}">
        <span class="val-display" id="revDisplay">${rev}</span>
      </div>`;
    renderFretboard();
  }
  document.getElementById('volumeSlider').addEventListener('input',e=>{ volumeLevel=e.target.value/100; document.getElementById('volDisplay').textContent=e.target.value; if(masterGain) masterGain.gain.value=volumeLevel; });
  document.getElementById('reverbSlider').addEventListener('input',e=>{ reverbLevel=e.target.value/100; document.getElementById('revDisplay').textContent=e.target.value; if(reverbGain) reverbGain.gain.value=reverbLevel; if(dryGain) dryGain.gain.value=1-reverbLevel*0.5; });
}

function renderWaves() {
  const labels={sine:'SIN',triangle:'TRI',sawtooth:'SAW',square:'SQR'};
  const el=document.getElementById('waveGrid'); el.innerHTML='';
  Object.keys(labels).forEach(w=>{
    const b=document.createElement('button');
    b.className='wave-btn'+(w===currentWave?' active':'');
    b.textContent=labels[w];
    b.onclick=()=>{ currentWave=w; document.querySelectorAll('.wave-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    el.appendChild(b);
  });
}

function renderKeyboard() {
  const sn=getScaleNotes(), el=document.getElementById('keyboard'); el.innerHTML='';
  KEYBOARD_NOTES.forEach(({name,octave,isBlack})=>{
    const id=name+octave, key=document.createElement('div');
    key.className='key '+(isBlack?'black':'white')+(sn.includes(name)?' in-scale':'')+(name===currentRoot?' root-note':'');
    key.dataset.note=id; key.dataset.freq=nameOctaveToFreq(name,octave);
    const lbl=document.createElement('span'); lbl.className='key-label'; lbl.textContent=name; key.appendChild(lbl);
    key.addEventListener('mousedown',e=>{ e.preventDefault(); initAudio(); triggerNote(id,+key.dataset.freq); });
    key.addEventListener('mouseup',()=>releaseNote(id));
    key.addEventListener('mouseleave',()=>releaseNote(id));
    key.addEventListener('touchstart',e=>{ e.preventDefault(); initAudio(); triggerNote(id,+key.dataset.freq); });
    key.addEventListener('touchend',e=>{ e.preventDefault(); releaseNote(id); });
    el.appendChild(key);
  });
  const leg=document.getElementById('kbdLegend'); if (!leg) return; leg.innerHTML='';
  const shown={};
  KEYBOARD_NOTES.slice(0,13).forEach(({name,octave})=>{
    const id=name+octave, k=KB_REVERSE[id];
    if (k&&!shown[id]) { shown[id]=true; const d=document.createElement('div'); d.className='kbd'; d.innerHTML=`${k.toUpperCase()} <span>${name}</span>`; leg.appendChild(d); }
  });
}

function triggerNote(id, freq) {
  noteOn(freq,id);
  const key=document.querySelector(`[data-note="${id}"]`); if (key) key.classList.add('playing');
  const pill=document.getElementById('notepill-'+id.replace(/\d/g,'')); if (pill) pill.classList.add('playing');
}

function releaseNote(id) {
  noteOff(id);
  const key=document.querySelector(`[data-note="${id}"]`); if (key) key.classList.remove('playing');
  const pill=document.getElementById('notepill-'+id.replace(/\d/g,'')); if (pill) pill.classList.remove('playing');
}

// ── FRETBOARD ────────────────────────────────────────────────
function renderFretboard() {
  const {strings,markers,double:dbl}=MODES[currentMode];
  const sn=getScaleNotes();
  const FW=56,SH=38,LW=34,OW=40,NW=7,HH=26,FH=22,NF=12;
  const totalW=LW+OW+NW+NF*FW, totalH=HH+strings.length*SH+FH;
  const el=document.getElementById('fretboard');
  el.innerHTML=''; el.style.width=totalW+'px'; el.style.height=totalH+'px';

  const mk=(s)=>{ const e=document.createElement('div'); e.style.position='absolute'; Object.assign(e.style,s); return e; };

  // Open label
  const ol=mk({left:LW+'px',top:'2px',width:OW+'px',textAlign:'center',fontSize:'0.45rem',fontFamily:"'Space Mono',monospace",color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase'});
  ol.textContent='open'; el.appendChild(ol);

  // Fret numbers
  for (let f=1;f<=NF;f++) {
    const x=LW+OW+NW+(f-0.5)*FW;
    const n=mk({left:(x-15)+'px',top:'2px',width:'30px',textAlign:'center',fontSize:'0.5rem',fontFamily:"'Space Mono',monospace",color:markers.includes(f)?'var(--accent3)':'var(--muted)'});
    n.textContent=f; el.appendChild(n);
  }

  // Nut
  el.appendChild(mk({left:(LW+OW)+'px',top:HH+'px',width:NW+'px',height:(strings.length*SH)+'px',background:'var(--text)',opacity:'0.45',borderRadius:'1px'}));

  // Fret lines
  for (let f=1;f<=NF;f++) el.appendChild(mk({left:(LW+OW+NW+f*FW)+'px',top:HH+'px',width:'1px',height:(strings.length*SH)+'px',background:'var(--border)'}));

  // Position markers
  const my=HH+strings.length*SH+7;
  markers.forEach(f=>{ const cx=LW+OW+NW+(f-0.5)*FW; (dbl.includes(f)?[-8,8]:[0]).forEach(off=>el.appendChild(mk({left:(cx+off-4)+'px',top:my+'px',width:'8px',height:'8px',borderRadius:'50%',background:'var(--muted)',opacity:'0.3'}))); });

  // Strings + dots
  strings.forEach((str,si)=>{
    const y=HH+si*SH+SH/2, th=Math.max(1,(strings.length-si)*0.6);
    const lb=mk({left:'0px',top:(y-10)+'px',width:LW+'px',height:'20px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.65rem',fontFamily:"'Space Mono',monospace",color:'var(--muted)'});
    lb.textContent=str.label; el.appendChild(lb);
    el.appendChild(mk({left:LW+'px',top:(y-Math.ceil(th/2))+'px',right:'0px',height:Math.ceil(th)+'px',background:`rgba(24,24,42,${0.15+(strings.length-si)*0.04})`}));
    placeDot(el,str.midi,LW+OW/2,y,sn,`open-${si}`);
    for (let f=1;f<=NF;f++) placeDot(el,str.midi+f,LW+OW+NW+(f-0.5)*FW,y,sn,`s${si}f${f}`);
  });
}

function placeDot(parent, midi, cx, cy, sn, id) {
  const name=NOTES[midi%12], inScale=sn.includes(name), isRoot=name===currentRoot;
  if (!inScale&&!isRoot) return;
  const S=26, dot=document.createElement('div');
  dot.style.cssText=`position:absolute;left:${cx-S/2}px;top:${cy-S/2}px;width:${S}px;height:${S}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.44rem;font-family:'Space Mono',monospace;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;z-index:2;user-select:none;`;
  if (isRoot) { dot.style.background='rgba(224,0,61,0.12)'; dot.style.border='1.5px solid rgba(224,0,61,0.65)'; dot.style.color='var(--accent2)'; }
  else        { dot.style.background='rgba(80,64,200,0.1)';  dot.style.border='1.5px solid rgba(80,64,200,0.5)';  dot.style.color='var(--accent3)'; }
  dot.textContent=name;
  const freq=midiToFreq(midi);
  dot.addEventListener('mouseenter',()=>{ dot.style.transform='scale(1.18)'; dot.style.boxShadow=isRoot?'0 0 12px rgba(224,0,61,0.35)':'0 0 12px rgba(80,64,200,0.35)'; });
  dot.addEventListener('mouseleave',()=>{ dot.style.transform='scale(1)'; dot.style.boxShadow=''; });
  dot.addEventListener('click',()=>{
    pluck(freq,id);
    dot.style.background='rgba(0,168,107,0.2)'; dot.style.borderColor='var(--accent)'; dot.style.color='var(--accent)';
    setTimeout(()=>{ dot.style.background=isRoot?'rgba(224,0,61,0.12)':'rgba(80,64,200,0.1)'; dot.style.borderColor=isRoot?'rgba(224,0,61,0.65)':'rgba(80,64,200,0.5)'; dot.style.color=isRoot?'var(--accent2)':'var(--accent3)'; },350);
  });
  parent.appendChild(dot);
}

function renderBacking() {
  const el=document.getElementById('backingGrid'); el.innerHTML='';
  MODES[currentMode].backing.forEach(({name,genre,url})=>{
    const b=document.createElement('button'); b.className='backing-btn';
    b.innerHTML=`<span>${name}</span><span class="backing-genre">${genre}</span>`;
    b.onclick=()=>window.open(url,'_blank'); el.appendChild(b);
  });
}

function renderTip() {
  const tips=MODES[currentMode].tips, tip=tips[tipIndex%tips.length];
  document.getElementById('tipBox').innerHTML=`<div class="tip-title">${tip.title}</div>${tip.text}`;
}

// ── KEYBOARD INPUT (synth only) ───────────────────────────────
const pressedKeys=new Set();
document.addEventListener('keydown',e=>{
  if (currentMode!=='synth'||e.repeat||pressedKeys.has(e.key)) return;
  const id=KB_MAP[e.key.toLowerCase()]; if (!id) return;
  pressedKeys.add(e.key); initAudio();
  triggerNote(id, nameOctaveToFreq(id.replace(/\d/,''), +id.match(/\d/)[0]));
});
document.addEventListener('keyup',e=>{
  const id=KB_MAP[e.key.toLowerCase()]; pressedKeys.delete(e.key);
  if (!id||currentMode!=='synth') return; releaseNote(id);
});

// ── VISUALIZER ────────────────────────────────────────────────
const vizEl=document.getElementById('visualizer');
const bars=[];
for (let i=0;i<48;i++) {
  const b=document.createElement('div'); b.className='viz-bar';
  b.style.left=(i*(100/48))+'%'; b.style.height='2px';
  b.style.background=`hsl(${150+i*4},65%,42%)`;
  vizEl.appendChild(b); bars.push(b);
}

let vizFreq=440, vizAnim=null, vizActive=false;

function animateViz() {
  vizAnim=requestAnimationFrame(function loop() {
    const t=Date.now()/1000;
    const on=Object.keys(activeOscillators).length>0||vizActive;
    bars.forEach((b,i)=>{ const w=Math.sin(t*vizFreq/55+i*0.38)*0.5+0.5; b.style.height=(on?(w+Math.random()*0.1)*50+3:Math.random()*3+1)+'px'; });
    if (on) { vizAnim=requestAnimationFrame(loop); } else { bars.forEach(b=>b.style.height='2px'); vizAnim=null; }
  });
}

// ── REFRESH ───────────────────────────────────────────────────
function refreshScale() {
  renderRoots(); renderScales(); renderNotes();
  if (currentMode==='synth') renderKeyboard(); else renderFretboard();
}

function refresh() {
  renderModes(); renderRoots(); renderScales(); renderNotes();
  renderInstrumentSection(); renderBacking();
  tipIndex=Math.floor(Math.random()*MODES[currentMode].tips.length); renderTip();
}

setInterval(()=>{ tipIndex=(tipIndex+1)%MODES[currentMode].tips.length; renderTip(); },8000);
refresh();
</script>
